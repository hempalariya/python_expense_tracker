{% extends "layout.html" %} {% block body %}
<div class="flex gap-2">
  <div
    class="text-stone-200 my-10 rounded-md shadow-stone-400 shadow-xs p-4 w-[70%]"
  >
    <h3 class="font-bold text-lg mb-3">Filters</h3>
    <form action="" class="flex justify-between">
      <div>
        <label for="start-date">Start</label>
        <input type="date" id="start" class="bg-stone-600 rounded-md px-2" />
      </div>
      <div>
        <label for="end-date">End</label>
        <input type="date" id="end" class="bg-stone-600 rounded-md px-2" />
      </div>
      <div class="flex gap-2">
        <button
          type="submit"
          class="bg-teal-100 text-teal-500 px-2 py-1 rounded-md"
        >
          Apply
        </button>
        <button type="button" class="bg-stone-600 px-2 py-1 rounded-md">
          Reset
        </button>
      </div>
    </form>
  </div>
  <div
    class="text-stone-200 my-10 rounded-md shadow-stone-400 shadow-xs p-4 w-[30%]"
  >
    <h3 class="font-bold text-lg mb-3">Add Expenses</h3>
    <form action="" class="flex flex-col gap-2">
      <div class="flex flex-col">
        <label for="description">Description</label>
        <input type="text" placeholder="e.g. Groceries" />
      </div>
      <div class="flex gap-3">
        <div class="flex flex-col">
          <label for="amount">Amount</label>
          <input
            type="text"
            placeholder="25.00"
            class="bg-stone-600 rounded-md px-2 w-full"
          />
        </div>
        <div class="flex flex-col">
          <label for="date">Date</label>
          <input type="date" class="bg-stone-600 rounded-md px-2 w-full" />
        </div>
      </div>
      <div class="flex flex-col">
        <label for="category">Category</label>
        <select name="" id="" class="bg-stone-600 rounded-md px-2 w-full">
          <option value="">Food</option>
          <option value="">utilities</option>
          <option value="">Medical</option>
        </select>
      </div>
      <button
        type="submit"
        class="bg-teal-100 text-teal-500 px-2 py-1 rounded-md w-full"
      >
        Add Expenses
      </button>
    </form>
  </div>
</div>

<div class="text-stone-200 text-lg">
  Total: <span class="bg-stone-600 rounded-md px-4 py-2">₹0.00</span>
</div>

<div
  class="text-stone-200 my-10 rounded-md shadow-stone-400 shadow-xs p-4 w-full"
>
  <h3 class="font-bold text-lg mb-3">Expenses</h3>
  <table class="w-full">
    <thead class="bg-stone-600 text-lg text-left">
      <th>Date</th>
      <th>Description</th>
      <th>Category</th>
      <th>Amount</th>
      <th></th>
    </thead>
    <tr>
      <td>12/05/2026</td>
      <td>groceries</td>
      <td>food</td>
      <td>15</td>
      <td>
        <button>🗑️</button>
      </td>
    </tr>
  </table>
</div>

<div class="text-white">
  <div>
    <p>by category</p>
  </div>
  <div>
    <p>spending over time</p>
  </div>
</div>
{% endblock %}
